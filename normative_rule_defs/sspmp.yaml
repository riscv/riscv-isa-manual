---
# yaml-language-server: $schema=../docs-resources/schemas/defs-schema.json

$schema: "../docs-resources/schemas/defs-schema.json#"

# Used to create normative rules for sspmp.adoc (Sspmp, Sspmpen, Smpmpdeleg extensions).
# Tags refer to anchors in src/sspmp.adoc.

normative_rule_definitions:
  ##############################################
  # Sspmp Section: Extension Dependencies
  ##############################################
  - name: sspmp_dep_sscsrind
    description: |
      The Sscsrind extension for indirect CSR access must be implemented.
    tags: ["norm:ext:Sspmp:dep_sscsrind"]
  - name: sspmp_dep_sum_writable
    description: |
      The sstatus.SUM bit must be writable.
    tags: ["norm:ext:Sspmp:dep_sum_writable"]
  - name: sspmp_dep_mxr_writable
    description: |
      The sstatus.MXR bit must be writable.
    tags: ["norm:ext:Sspmp:dep_mxr_writable"]

  ##############################################
  # Sspmp Section: SPMP CSRs
  ##############################################
  - name: spmpaddr_format_rv32
    description: |
      On RV32, each spmpaddr encodes a 34-bit physical address from bit 33 down to bit 2.
    tags: ["norm:csr:spmpaddr:format_rv32"]
  - name: spmpaddr_format_rv64
    description: |
      On RV64, each spmpaddr encodes a 56-bit physical address from bit 55 down to bit 2.
    tags: ["norm:csr:spmpaddr:format_rv64"]
  - name: spmpcfg_rwx_bits
    description: |
      The R, W, and X bits of spmpcfg govern read, write, and execute permissions.
    tags: ["norm:csrfld:spmpcfg:RWX:bits"]
  - name: spmpcfg_a_field
    description: |
      The A field of spmpcfg selects the address-matching mode (OFF/TOR/NA4/NAPOT).
    tags: ["norm:csrfld:spmpcfg:A:field"]
  - name: spmpcfg_lock_bit
    description: |
      The L (lock) bit locks an SPMP entry irrespective of the A field.
    tags: ["norm:csrfld:spmpcfg:L:lock_bit"]
  - name: spmpcfg_lock_write_ignored
    description: |
      Writes to spmpcfg[i] and spmpaddr[i] of a locked entry via siselect are ignored.
    tags: ["norm:csrfld:spmpcfg:L:write_ignored"]
  - name: spmpcfg_lock_tor_prev_addr
    description: |
      When a locked entry has A=TOR, writes to the preceding spmpaddr[i-1] are also ignored.
    tags: ["norm:csrfld:spmpcfg:L:tor_prev_addr"]
  - name: spmpcfg_u_bit
    description: |
      The U bit selects U-mode vs S-mode-only rule for non-Shared-Region entries.
    tags: ["norm:csrfld:spmpcfg:U:mode_select"]
  - name: spmpcfg_shared_bit
    description: |
      The SHARED bit identifies a rule as a Shared-Region rule.
    tags: ["norm:csrfld:spmpcfg:SHARED:shared_region"]

  ##############################################
  # Sspmp Section: Address Matching
  ##############################################
  - name: addr_match_off
    description: |
      A=OFF disables the entry (matches nothing).
    tags: ["norm:csrfld:spmpcfg:A:match_off"]
  - name: addr_match_tor
    description: |
      A=TOR selects top-of-range matching using the preceding spmpaddr.
    tags: ["norm:csrfld:spmpcfg:A:match_tor"]
  - name: addr_match_na4
    description: |
      A=NA4 selects a naturally aligned 4-byte region.
    tags: ["norm:csrfld:spmpcfg:A:match_na4"]
  - name: addr_match_napot
    description: |
      A=NAPOT selects a naturally aligned power-of-two region of at least 8 bytes.
    tags: ["norm:csrfld:spmpcfg:A:match_napot"]
  - name: addr_match_tor_entry0
    description: |
      When spmpcfg[0].A=TOR, the lower bound is zero (no preceding spmpaddr).
    tags: ["norm:csrfld:spmpcfg:A:tor_entry0"]

  ##############################################
  # Sspmp Section: Encoding of Permissions
  ##############################################
  - name: smode_rule_enforce
    description: |
      An S-mode-only rule enforces S-mode accesses and denies U-mode accesses.
    tags: ["norm:ext:Sspmp:smode_rule_enforce"]
  - name: umode_rule_enforce
    description: |
      A U-mode rule is always enforced for U-mode accesses.
    tags: ["norm:ext:Sspmp:umode_rule_enforce"]
  - name: umode_rule_sum_effect
    description: |
      sstatus.SUM governs whether S-mode may access U-mode regions.
    tags: ["norm:ext:Sspmp:umode_rule_sum_effect"]
  - name: umode_rule_sum_denied
    description: |
      With sstatus.SUM clear, a U-mode rule denies any Supervisor mode access.
    tags: ["norm:ext:Sspmp:umode_rule_sum_denied"]
  - name: umode_rule_enforceNoX
    description: |
      When SUM=1, S-mode access to a U-mode region is EnforceNoX: R/W allowed, X denied.
    tags: ["norm:ext:Sspmp:umode_rule_enforceNoX"]
  - name: shared_rule_enforce
    description: |
      A Shared-Region rule is enforced for both S-mode and U-mode; U-mode R and W are mutually exclusive.
    tags: ["norm:ext:Sspmp:shared_rule_enforce"]
  - name: shared_rule_sum_ignored
    description: |
      For Shared-Region rules (SHARED=1, U=1), sstatus.SUM is irrelevant.
    tags: ["norm:ext:Sspmp:shared_rule_sum_ignored"]
  - name: rwx_010_reserved
    description: |
      spmpcfg.RWX=010 is reserved for future standard use.
    tags: ["norm:csrfld:spmpcfg:RWX:rwx_010_reserved"]
  - name: rwx_011_reserved
    description: |
      spmpcfg.RWX=011 is reserved for future standard use.
    tags: ["norm:csrfld:spmpcfg:RWX:rwx_011_reserved"]

  ##############################################
  # Sspmp Section: Matching Logic
  ##############################################
  - name: match_priority
    description: |
      The lowest-numbered matching SPMP entry determines the allow/deny decision.
    tags: ["norm:ext:Sspmp:match_priority"]
  - name: no_match_deny
    description: |
      If no SPMP entry matches and at least one entry is implemented, the S/U access is denied.
    tags: ["norm:ext:Sspmp:no_match_deny"]
  - name: match_irrespective_perm_bits
    description: |
      Address matching is done irrespective of SHARED/U/R/W/X bits.
    tags: ["norm:ext:Sspmp:match_irrespective_perm_bits"]

  ##############################################
  # Sspmp Section: SPMP and Paging
  ##############################################
  - name: spmp_paging_mutual_exclusion
    description: |
      SPMP and paged virtual memory are mutually exclusive; SPMP acts only when satp.mode=Bare.
    tags: ["norm:ext:Sspmp:paging_mutual_exclusion"]

  ##############################################
  # Sspmp Section: Access Method (siselect/sireg)
  ##############################################
  - name: siselect_spmpaddr_mapping
    description: |
      sireg accesses spmpaddr[i] when siselect selects entry i.
    tags: ["norm:csr:siselect:spmpaddr_mapping"]
  - name: siselect_spmpcfg_mapping
    description: |
      sireg2 accesses spmpcfg[i] when siselect selects entry i.
    tags: ["norm:csr:siselect:spmpcfg_mapping"]
  - name: siselect_oob_read_zero
    description: |
      Out-of-bounds siselect values make sireg/sireg2 reads return zero.
    tags: ["norm:csr:siselect:oob_read_zero"]
  - name: siselect_oob_write_ignored
    description: |
      Out-of-bounds siselect values cause sireg/sireg2 writes to be ignored.
    tags: ["norm:csr:siselect:oob_write_ignored"]
  - name: sfence_vma_ordering
    description: |
      SFENCE.VMA rs1=x0, rs2=x0 orders preceding SPMP CSR writes against
      subsequent S- or U-mode memory accesses.
    tags: ["norm:ext:Sspmp:sfence_vma_ordering"]

  ##############################################
  # Sspmp Section: Exceptions
  ##############################################
  - name: spmp_instr_page_fault
    description: |
      SPMP-denied instruction fetches raise exception code 12 (Instruction page fault).
    tags: ["norm:ext:Sspmp:instr_page_fault"]
  - name: spmp_load_page_fault
    description: |
      SPMP-denied loads raise exception code 13 (Load page fault).
    tags: ["norm:ext:Sspmp:load_page_fault"]
  - name: spmp_store_page_fault
    description: |
      SPMP-denied stores/AMOs raise exception code 15 (Store/AMO page fault).
    tags: ["norm:ext:Sspmp:store_page_fault"]

  ##############################################
  # Sspmpen Section
  ##############################################
  - name: spmpen_readwrite
    description: |
      The spmpen CSR is read/write (RV64: 64-bit; RV32: spmpenh aliases the upper 32 bits).
    tags: ["norm:ext:Sspmpen:spmpen_readwrite", "norm:ext:Sspmpen:spmpenh_alias"]
  - name: spmpen_activation_condition
    description: |
      SPMP entry i is active iff spmpen[i] & spmpcfg[i].A != 0.
    tags: ["norm:ext:Sspmpen:activation_condition"]
  - name: spmpen_locked_readonly
    description: |
      When spmpcfg[i].L=1, spmpen[i] becomes read-only.
    tags: ["norm:ext:Sspmpen:locked_readonly"]

  ##############################################
  # Smpmpdeleg Section: Resource Sharing (mpmpdeleg)
  ##############################################
  - name: mpmpdeleg_pmpnum_field
    description: |
      mpmpdeleg.pmpnum is a WARL field giving the starting index for SPMP delegation.
    tags: ["norm:csrfld:mpmpdeleg:pmpnum:field"]
  - name: mpmpdeleg_pmpnum_zero_delegates_all
    description: |
      pmpnum=0 delegates all writable PMP entries to SPMP; pmpnum=NUM_PMP_ENTRIES delegates none.
    tags: ["norm:csrfld:mpmpdeleg:pmpnum:zero_delegates_all"]
  - name: mpmpdeleg_no_delegation_disables
    description: |
      When no entries are delegated, SPMP is effectively disabled: reads return zero, writes ignored.
    tags: ["norm:csrfld:mpmpdeleg:pmpnum:no_delegation_disables"]
  - name: mpmpdeleg_locked_pmp_constraint
    description: |
      pmpnum cannot be lowered to or below the index of any locked PMP entry.
    tags: ["norm:csrfld:mpmpdeleg:pmpnum:locked_pmp_constraint"]

  ##############################################
  # Smpmpdeleg Section: M-mode Access
  ##############################################
  - name: miselect_spmp_access
    description: |
      M-mode indirect access uses miselect for entry selection; mireg and mireg2 access spmpaddr/spmpcfg.
    tags: ["norm:csr:miselect:spmp_access"]
  - name: mmode_mem_access_bypasses_spmp
    description: |
      M-mode effective memory accesses are allowed irrespective of SPMP permissions.
    tags: ["norm:ext:Sspmp:mmode_mem_bypass"]
  - name: lock_clear_via_miselect
    description: |
      The spmpcfg[i].L bit can only be cleared by M-mode via miselect indirect access.
    tags: ["norm:csrfld:spmpcfg:L:clear_via_miselect"]
