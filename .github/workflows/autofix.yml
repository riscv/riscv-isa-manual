---
# SPDX-License-Identifier: Apache-2.0

name: autofix.ci

on:
  pull_request:

# Only run on the latest commit if a PR is updated
concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  autofix:
    name: Regenerate checked-in normative tag reference
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      # Rebuilds build/riscv-spec-norm-tags.json from the sources (inside the
      # RISC-V docs Docker container, which the Makefile pulls automatically) and
      # copies it over the checked-in ref/riscv-spec-norm-tags.json. This is the
      # same regeneration that `make check-ref` performs in check-normative-tags.yml,
      # except here the result is committed back to the PR instead of failing it.
      - name: Regenerate normative tag reference
        run: make update-ref

      - name: Apply fixes
        uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
