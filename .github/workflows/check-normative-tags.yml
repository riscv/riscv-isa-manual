---
name: Check Normative Tag Changes

# This workflow enforces two independent things:
#
#   1. Freshness (mechanical, never bypassable). ref/*.json must match a fresh
#      build exactly. `make check-ref` regenerates it and fails if anything
#      changed. Previously this job used detect_tag_changes.py --update-reference
#      as the freshness mechanism, but that only ever merges *additions* and
#      compares text with formatting normalized away, so ref/ silently drifted
#      (riscv/riscv-isa-manual#3186).
#
#   2. Governance (human judgement). Additions/modifications/deletions of
#      normative text are reported for review, and modifications or deletions
#      fail unless the PR carries the 'normative-change-approved' label.
#
# SECURITY: this job builds pull request code, so it must stay on `pull_request`
# (fork PRs get a read-only token) and never `pull_request_target`. It formerly
# ran on pull_request_target with `contents: write` while checking out the PR
# head and invoking a PR-controlled Makefile, which allowed any PR author to push
# to the repository. Because the token is read-only for forks, the report is
# published to the job summary rather than posted as a PR comment.

on:
  push:
  pull_request:
    # The explicit type list is required for the label bypass to work at all.
    # The default set is opened/synchronize/reopened, so adding
    # 'normative-change-approved' would not re-run the workflow and the approval
    # would not take effect until the next push.
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  workflow_dispatch:  # Allows manual testing from GitHub UI

permissions:
  contents: read

env:
  # Branches that trigger issue creation on push/merge
  # Add or remove branches as needed (comma-separated)
  ISSUE_TRIGGER_BRANCHES: 'main'
  # Specifications to check (space-separated, matches DOCS in the Makefile)
  SPECS: 'riscv-spec'

jobs:
  check-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Used only by the push-to-main issue step. Fork pull requests receive a
      # read-only token regardless of what is requested here.
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive
          # Needed so the report can read ref/*.json as of the base revision.
          fetch-depth: 0

      - name: Build normative tags
        run: make build-tags

      - name: Check if branch triggers issues
        id: branch-check
        if: github.event_name == 'push'
        run: |
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Current branch: $CURRENT_BRANCH"
          if echo "$ISSUE_TRIGGER_BRANCHES" | grep -qE "(^|,)${CURRENT_BRANCH}(,|$)"; then
            echo "is_trigger_branch=true" >> "$GITHUB_OUTPUT"
            echo "Branch '$CURRENT_BRANCH' is configured to trigger issues"
          else
            echo "is_trigger_branch=false" >> "$GITHUB_OUTPUT"
            echo "Branch '$CURRENT_BRANCH' is not configured to trigger issues"
          fi

      - name: Resolve base revision
        id: base
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              BASE='${{ github.event.pull_request.base.sha }}'
              ;;
            push)
              # github.event.before is *this branch's* previous tip. That is only
              # a meaningful comparison on the branches we track: on a feature
              # branch it is wherever the branch last happened to point, which
              # says nothing about what the work introduces. (A branch opened
              # from an issue starts at main's tip at that moment, so the first
              # push would otherwise diff against a long-stale ref/.) Pull
              # request runs cover feature branches properly, against the real
              # merge base.
              if [ "${{ steps.branch-check.outputs.is_trigger_branch }}" = "true" ]; then
                BASE='${{ github.event.before }}'
              else
                BASE=''
              fi
              ;;
            *)
              BASE=''
              ;;
          esac

          # before is also all-zeros for a newly created branch, and the commit
          # can be absent entirely after a force push.
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
            echo "No usable base revision; the change report will be skipped."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "sha=$BASE" >> "$GITHUB_OUTPUT"
          fi

      - name: Report normative tag changes
        id: report
        if: steps.base.outputs.available == 'true'
        env:
          BASE_SHA: ${{ steps.base.outputs.sha }}
        run: |
          set +e  # Collect every spec's result rather than stopping at the first

          HAS_ANY_CHANGES=false
          HAS_BREAKING_CHANGES=false

          {
            echo "## Normative Tag Change Report"
            echo
            echo "Comparing \`ref/\` as of \`${BASE_SHA}\` against the tags built"
            echo "from this revision's sources."
            echo
          } > tag_changes.md

          for spec in $SPECS; do
            base_tags="${RUNNER_TEMP}/${spec}-base-norm-tags.json"

            if ! git show "${BASE_SHA}:ref/${spec}-norm-tags.json" > "$base_tags" 2>/dev/null; then
              echo "_No \`ref/${spec}-norm-tags.json\` at the base revision; skipping._" >> tag_changes.md
              continue
            fi

            OUTPUT=$(python3 docs-resources/tools/detect_tag_changes.py \
              --verbose \
              "$base_tags" \
              "build/${spec}-norm-tags.json" 2>&1)
            EXIT_CODE=$?

            {
              echo "### ${spec} Specification"
              echo
              echo '```'
              echo "$OUTPUT"
              echo '```'
              echo
            } >> tag_changes.md

            echo "$OUTPUT"

            # Any change at all (additions, modifications or deletions)
            if echo "$OUTPUT" | grep -qE "(Added|Modified|Deleted) [0-9]+ tag"; then
              HAS_ANY_CHANGES=true
            fi

            # Non-zero exit means modifications or deletions, i.e. changes to
            # normative text that already existed.
            if [ $EXIT_CODE -ne 0 ]; then
              HAS_BREAKING_CHANGES=true
            fi
          done

          cat tag_changes.md >> "$GITHUB_STEP_SUMMARY"

          echo "has_any_changes=$HAS_ANY_CHANGES" >> "$GITHUB_OUTPUT"
          echo "has_breaking_changes=$HAS_BREAKING_CHANGES" >> "$GITHUB_OUTPUT"

      # The freshness gate. Runs after the report so that a contributor whose
      # ref/ is stale still gets to see what actually changed.
      #
      # check-ref regenerates the files, so its own advice ("commit the result")
      # is aimed at someone running it locally. Here the fix has to happen either
      # on the contributor's machine or via the on-demand autofix workflow, so
      # point at both: a maintainer can apply the 'update-norm-rules' label to
      # have autofix regenerate and commit the files, or the contributor can
      # regenerate locally.
      - name: Verify ref/ is up to date
        run: |
          if ! make check-ref; then
            echo "::error::Normative tag reference files are out of date. A maintainer can apply the 'update-norm-rules' label to have autofix regenerate and commit them, or run 'make update-ref' locally and commit the result."
            exit 1
          fi

      - name: Check for bypass label
        id: bypass
        if: github.event_name == 'pull_request'
        env:
          # Via env rather than inline interpolation: label text is attacker
          # controlled and must never be pasted into the shell.
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q 'normative-change-approved'; then
            echo "has_bypass=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Bypass label found - normative changes will report but not fail"
          else
            echo "has_bypass=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue on merge to configured branches
        if: >-
          steps.report.outputs.has_any_changes == 'true' &&
          github.event_name == 'push' &&
          steps.branch-check.outputs.is_trigger_branch == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const script = require('./.github/scripts/create-tag-change-issue.js');
            const tagChanges = fs.readFileSync('tag_changes.md', 'utf8');
            await script({github, context, tagChanges});

      - name: Report normative changes detected
        if: steps.report.outputs.has_any_changes == 'true'
        run: |
          echo "::warning::Normative tag changes detected (additions, modifications, or deletions)."
          echo "::notice::See the job summary for the full report."

      # The governance gate. Additions alone are fine; changing or removing
      # normative text that already shipped needs an explicit sign-off.
      #
      # Pull requests only. That is where the label lives and where review
      # happens, and the bypass step above does not even run on other events, so
      # a push could never be approved out of this gate. On a push to main the
      # change is already merged and failing the build achieves nothing -- the
      # issue created above is the response there.
      - name: Fail on unapproved normative changes
        if: >-
          github.event_name == 'pull_request' &&
          steps.report.outputs.has_breaking_changes == 'true' &&
          steps.bypass.outputs.has_bypass != 'true'
        run: |
          echo "::error::Normative tags were modified or deleted. Review the job summary."
          echo "If the change is intentional and approved, add the"
          echo "'normative-change-approved' label to the pull request."
          exit 1
